<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA redirect trick
    // When GitHub Pages serves a 404, this page redirects to / with the
    // original path encoded as a query string so React Router can pick it up.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
